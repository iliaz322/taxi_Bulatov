<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 34px system-ui, -apple-system, sans-serif; fill: #1c1c1e; }
      .subtitle { font: 400 18px system-ui, -apple-system, sans-serif; fill: #5e5e5e; }
      .box-title { font: 700 22px system-ui, -apple-system, sans-serif; fill: #1c1c1e; }
      .box-text { font: 400 16px system-ui, -apple-system, sans-serif; fill: #5e5e5e; }
      .label { font: 700 15px system-ui, -apple-system, sans-serif; fill: #846600; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1c1c1e"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>

  <text x="80" y="78" class="title">Приложение В. Структура маршрута пользователя в веб-приложении TaxiGo</text>
  <text x="80" y="112" class="subtitle">Типовой сценарий: от главной страницы до завершения поездки и просмотра истории заказов</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="260" height="110" rx="22" fill="#000000"/>
    <text x="110" y="220" class="box-title" fill="#ffffff" style="fill:#ffffff;">1. Главная страница</text>
    <text x="110" y="248" class="box-text" fill="#ffffff" style="fill:#d0d0d0;">Просмотр сервиса и тарифов</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="170" width="260" height="110" rx="22" fill="#f3f3f4"/>
    <text x="450" y="220" class="box-title">2. Регистрация / вход</text>
    <text x="450" y="248" class="box-text">Авторизация пользователя</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="170" width="260" height="110" rx="22" fill="#f3f3f4"/>
    <text x="790" y="220" class="box-title">3. Форма заказа</text>
    <text x="790" y="248" class="box-text">Переход к созданию поездки</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1100" y="170" width="320" height="110" rx="22" fill="#f3f3f4"/>
    <text x="1130" y="220" class="box-title">4. Ввод адресов и тариф</text>
    <text x="1130" y="248" class="box-text">Выбор точек на карте и класса поездки</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="390" width="320" height="120" rx="22" fill="#f3f3f4"/>
    <text x="210" y="440" class="box-title">5. Расчёт стоимости</text>
    <text x="210" y="468" class="box-text">Расстояние, цена по тарифу,</text>
    <text x="210" y="492" class="box-text">обновление данных в реальном времени</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="390" width="320" height="120" rx="22" fill="#f3f3f4"/>
    <text x="650" y="440" class="box-title">6. Подтверждение заказа</text>
    <text x="650" y="468" class="box-text">Создание записи о поездке</text>
    <text x="650" y="492" class="box-text">и назначение автомобиля</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1060" y="390" width="360" height="120" rx="22" fill="#000000"/>
    <text x="1090" y="440" class="box-title" fill="#ffffff" style="fill:#ffffff;">7. Статус поездки</text>
    <text x="1090" y="468" class="box-text" fill="#ffffff" style="fill:#d0d0d0;">Отображение водителя, машины,</text>
    <text x="1090" y="492" class="box-text" fill="#ffffff" style="fill:#d0d0d0;">маршрута и демо-трекинга</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="630" width="320" height="120" rx="22" fill="#f3f3f4"/>
    <text x="320" y="680" class="box-title">8. Завершение поездки</text>
    <text x="320" y="708" class="box-text">Автоматическая смена статуса</text>
    <text x="320" y="732" class="box-text">на «Завершена»</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="630" width="320" height="120" rx="22" fill="#f3f3f4"/>
    <text x="790" y="680" class="box-title">9. История заказов</text>
    <text x="790" y="708" class="box-text">Просмотр всех выполненных</text>
    <text x="790" y="732" class="box-text">и активных поездок</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1230" y="630" width="240" height="120" rx="22" fill="#fff6d6"/>
    <text x="1260" y="680" class="box-title">10. Оценка поездки</text>
    <text x="1260" y="708" class="box-text">Рейтинг и отзыв</text>
    <text x="1260" y="732" class="box-text">о поездке</text>
  </g>

  <path d="M340 225H420" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M680 225H760" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1020 225H1100" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1260 280V335C1260 360 1240 390 1205 390H1205" stroke="#1c1c1e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M1060 450H940" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 450H500" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M450 510V570C450 600 450 630 450 630" stroke="#1c1c1e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 690H760" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1080 690H1230" stroke="#1c1c1e" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1280" y="315" width="190" height="48" rx="24" fill="#fff6d6"/>
  <text x="1312" y="345" class="label">визуальная обратная связь</text>
</svg>
